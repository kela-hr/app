<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Kela HR – Support</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2937;
      text-align: center;
    }

    .container {
      max-width: 600px;
      width: 90%;
      padding: 30px 25px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 30px;
      color: #047857;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #4b5563;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #047857;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      margin-top: 5px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #047857;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: #065f46;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    .footer a {
      color: #047857;
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
